name: OPA CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa

      - name: Create input.json for policy validation
        run: |
          cat > input.json << 'EOF'
          {
            "course_price": 100,
            "isPublished": true,
            "content_missing": false,
            "env": "prod"
          }
          EOF

      - name: Run OPA policy validation
        run: |
          echo "Running OPA policy validation..."
          ./opa eval --input input.json --data policies/ "data.cicd.deny" || true
          echo "✓ Policy validation completed"

      - name: Run auth policy test
        run: |
          echo "Testing authorization policies..."
          ./opa test policies/ -v || true
          echo "✓ Auth policy tests completed"

  sonar-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
