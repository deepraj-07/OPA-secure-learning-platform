name: OPA CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  validate-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64
          chmod +x opa

      - name: Create input.json for policy validation
        run: |
          cat > input.json << 'EOF'
          {
            "course_price": 100,
            "isPublished": true,
            "content_missing": false,
            "env": "prod"
          }
          EOF

      - name: Run CI Policy Check
        run: |
          RESULT=$(./opa eval --format raw --input input.json --data policies/ci.rego "data.cicd.deny")
          if [ "$RESULT" != "[]" ]; then
            echo "Policy violation found"
            exit 1
          fi
          echo "Policy check passed"
